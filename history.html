<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoreProgress | My History</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💪</text></svg>">
    <style>
        .history-table { width: 100%; color: white; border-collapse: collapse; margin-top: 20px; font-size: 0.9rem; }
        .history-table th { padding: 12px; border-bottom: 1px solid var(--primary); color: var(--primary); text-align: left; }
        .history-table td { padding: 12px; border-bottom: 1px solid #1e293b; text-align: left; }
        .btn-delete { background: var(--error); color: white; border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer; font-size: 0.8rem; font-weight: bold; }
        .btn-delete:hover { opacity: 0.8; }
    </style>
</head>
<body class="auth-body">
    <nav>
        <div class="logo" onclick="window.location.href='index.html'">Core<span>Progress</span></div>
        <ul class="nav-links">
            <li><a href="index.html">Back to Dashboard</a></li>
        </ul>
    </nav>

    <div class="auth-container">
        <div class="card" style="width: 100%; max-width: 600px;">
            <div class="card-header">
                <h2>My Workout History</h2>
                <span class="icon">📅</span>
            </div>
            
            <table class="history-table">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Type</th>
                        <th>Result</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="history-body">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        const username = localStorage.getItem('currentUser');
        const tbody = document.getElementById('history-body');

        // Redirect to login if a guest tries to access this page
        if (!username) {
            window.location.href = 'login.html';
        }

        // --- FETCH AND DISPLAY LOGS ---
        function loadHistory() {
            fetch('/my-history', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username })
            })
            .then(res => res.json())
            .then(data => {
                tbody.innerHTML = ''; // Clear current table

                if (!data.success || data.logs.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; padding: 20px; color: var(--text-dim);">No workouts found. Start training!</td></tr>`;
                    return;
                }

                // Loop through logs and create table rows
                data.logs.forEach(log => {
                    const row = `
                        <tr>
                            <td>${log.date}</td>
                            <td style="font-weight: bold;">${log.type}</td>
                            <td style="color: var(--primary);">${log.value}</td>
                            <td>
                                <button class="btn-delete" onclick="deleteWorkout(${log.id})">🗑️ Delete</button>
                            </td>
                        </tr>
                    `;
                    tbody.innerHTML += row;
                });
            })
            .catch(err => console.error("Error loading history:", err));
        }

        // --- DELETE A LOG ---
        function deleteWorkout(logId) {
            if (!confirm("Are you sure you want to delete this log?")) return;

            fetch('/delete-log', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, logId })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    // Reload the table to remove the deleted item visually
                    loadHistory(); 
                } else {
                    alert("❌ " + data.message);
                }
            })
            .catch(err => console.error("Error deleting log:", err));
        }

        // Load history automatically when the page opens
        loadHistory();
    </script>
</body>
</html>
