<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoreProgress | Sign In</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💪</text></svg>">
</head>

<body class="auth-body">
    <nav>
        <div class="logo" onclick="window.location.href='index.html'">Core<span>Progress</span></div>

        <div class="music-player">
            <audio id="bg-music" controls>
                <source src="Coldplay - WE PRAY (TINI Version) (Official).mp3" type="audio/mpeg">
            </audio>
        </div>

        <ul class="nav-links">
            <li><a href="https://youtube.com/squashtv" target="_blank">SquashTV</a></li>
            <li><a href="index.html">Dashboard</a></li>
        </ul>
    </nav>

    <div class="auth-container">
        <div class="card auth-card">
            <div class="card-header">
                <h2>Welcome Back</h2>
                <span class="icon">🔑</span>
            </div>
            <p class="auth-subtitle">Log in to your account to sync progress</p>

            <form id="loginForm" class="auth-form">
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter your username" required>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn main-btn auth-submit">Sign In</button>
            </form>

            <div class="auth-footer">
                <span>Don't have an account? <a href="register.html">Register now</a></span>
            </div>
        </div>
    </div>

    <!-- Motivational Image Section -->
    <section class="footer-image-container">
        <img src="wpFG.jpg" alt="Workout Motivation" class="full-view-img">
    </section>

    <footer>
        <div class="footer-logo" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">Core<span>Progress</span></div>
        <p class="copyright">&copy; 2026 Vlad Holub</p>
    </footer>

    <script>
    const loginForm = document.getElementById('loginForm');

    loginForm.addEventListener('submit', function (e) {
        e.preventDefault();

        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        fetch('/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        })
        .then(response => response.json()) 
        .then(data => {
            if (data.success) {
                // Save the username to the browser's memory
                localStorage.setItem('currentUser', data.username);

                alert("👋 Welcome back, " + data.username + "!");
                this.reset();
                window.location.href = 'index.html';
            } else {
                alert("❌ " + data.message);
            }
        })
        .catch(error => {
            console.error('Error:', error);
            alert("❌ Server connection failed!");
        });
    });
</script>

</body>

</html>
